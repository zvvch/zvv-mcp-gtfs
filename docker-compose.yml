name: zvv-mcp-gtfs

services:
  gtfs:
    image: ghcr.io/zvvch/zvv-mcp-gtfs:latest
    # Lokal bauen statt ziehen: docker compose build
    build: .
    restart: unless-stopped
    environment:
      # Ohne Token sind /mcp und /api/query offen — das ist nur fuer
      # rein lokalen Betrieb ohne Tunnel vertretbar.
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
      GTFS_AUTO_UPDATE: ${GTFS_AUTO_UPDATE:-true}
      # Alle in der README dokumentierten Stellschrauben auch wirklich durchreichen.
      GTFS_UPDATE_INTERVAL_HOURS: ${GTFS_UPDATE_INTERVAL_HOURS:-24}
    volumes:
      - gtfs-data:/app/zvv-data
    ports:
      # Bewusst nur auf Loopback. Von aussen erreichbar wird der Dienst
      # ausschliesslich ueber den Cloudflare-Tunnel.
      # HOST_PORT ist ueberschreibbar, falls 3000 auf dem Host schon belegt ist.
      - "127.0.0.1:${HOST_PORT:-3000}:3000"

  # Cloudflare-Bridge. Startet nur mit: docker compose --profile tunnel up -d
  #
  # Named Tunnel mit LOKALEN Credentials: die Ingress-Regel steht hier
  # (--url zeigt auf den gtfs-Service im Compose-Netz), nicht im Dashboard.
  # Der Windows-cloudflared-Dienst auf dem Host bleibt davon unberuehrt.
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    restart: unless-stopped
    command: >
      tunnel --no-autoupdate
      --url http://gtfs:3000
      --credentials-file /etc/cloudflared/creds.json
      run ${TUNNEL_ID:-}
    volumes:
      # Credentials-JSON aus cloudflared tunnel create -- niemals ins Repo.
      - ${CF_CREDENTIALS_FILE:-/dev/null}:/etc/cloudflared/creds.json:ro
    depends_on:
      - gtfs

volumes:
  gtfs-data:
    # Fester Name statt Projekt-Praefix: die 5.3-GB-Datenbank soll ein
    # Umbenennen des Verzeichnisses oder des Compose-Projekts ueberleben.
    # external: das Volume wird bewusst ausserhalb des Compose-Lebenszyklus
    # gehalten -- ein "docker compose down -v" darf 5.3 GB nicht wegraeumen.
    name: zvv-gtfs-data
    external: true
