name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manueller Trigger via GitHub UI

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test

  deploy:
    name: Deploy to LXC
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Trigger deploy webhook
        run: |
          echo "=== Triggering deploy on gtfs.zvv.dev ==="

          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"${{ github.sha }}","actor":"${{ github.actor }}"}' \
            "${{ secrets.DEPLOY_URL }}" \
            --max-time 30 \
            -w "\n%{http_code}" 2>&1) || true

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Deploy fehlgeschlagen (HTTP $HTTP_CODE)"
            exit 1
          fi

          echo "Deploy gestartet – warte auf Restart..."

      - name: Wait for server restart
        run: |
          HEALTH_URL="${{ secrets.DEPLOY_URL }}"
          HEALTH_URL="${HEALTH_URL%/api/deploy}/health"

          echo "Health-Check: $HEALTH_URL"
          echo "Warte 15s auf Restart..."
          sleep 15

          for i in $(seq 1 12); do
            if HEALTH=$(curl -sf "$HEALTH_URL" --max-time 10 2>&1); then
              echo "=== Server ist online ==="
              echo "$HEALTH" | python3 -m json.tool 2>/dev/null || echo "$HEALTH"
              exit 0
            fi
            echo "Versuch $i/12 – noch nicht bereit..."
            sleep 5
          done

          echo "::error::Server antwortet nicht nach 75s!"
          exit 1
