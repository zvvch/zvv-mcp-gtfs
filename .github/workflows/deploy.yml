name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test

  deploy:
    name: Deploy to LXC
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Pull latest code
        working-directory: /home/gtfs/app
        run: git pull --ff-only

      - name: Install dependencies
        working-directory: /home/gtfs/app
        run: npm install --production --no-fund --no-audit

      - name: Restart server
        run: sudo systemctl restart gtfs

      - name: Health check
        run: |
          echo "Warte auf Server..."
          sleep 3
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/health >/dev/null 2>&1; then
              echo "Server ist online!"
              curl -sf http://localhost:3000/health | python3 -m json.tool 2>/dev/null || true
              exit 0
            fi
            echo "Versuch $i/15..."
            sleep 2
          done
          echo "::error::Server antwortet nicht!"
          journalctl -u gtfs --no-pager -n 30
          exit 1
